<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commande</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/STLLoader.js"></script>

</head>

<body>

<header>

<a href="index.html" class="logo">
<img src="logo.png">
</a>

<nav>
<a href="index.html">Accueil</a>
<a href="commande.html">Commander</a>
</nav>

</header>

<section class="commande">

<div class="commande-container">

<div class="form-left">

<h2>Configurer ta pièce</h2>

<label>Nom</label>
<input type="text" name="nom">

<label>Email</label>
<input type="email" name="email">

<label>Moteur</label>
<select>
<option>AM6</option>
<option>Derbi</option>
</select>

<label>Type de pièce</label>
<select>
<option>Cache allumage</option>
<option>Cache obturateur</option>
<option>Récupérateur de fluide</option>
</select>

<label>Texte</label>
<input type="text">

<label>Détails</label>
<textarea></textarea>

<button class="cta">Envoyer</button>

</div>

<div class="form-right">

<h2>Couleurs</h2>

<div class="color-picker">

<div class="color rouge" data-color="#ff0000"></div>
<div class="color bleu" data-color="#0044ff"></div>
<div class="color vert" data-color="#00aa00"></div>
<div class="color jaune" data-color="#ffee00"></div>
<div class="color violet" data-color="#7a00ff"></div>
<div class="color rose" data-color="#ff4df2"></div>
<div class="color orange" data-color="#ff6600"></div>
<div class="color noir" data-color="#000000"></div>
<div class="color blanc" data-color="#ffffff"></div>

</div>

<h3>Aperçu 3D</h3>

<div id="viewer"></div>

</div>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
