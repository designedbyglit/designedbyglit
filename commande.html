<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Configurer ta pièce</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<a href="index.html">
<img src="logo.png" class="logo">
</a>

<nav>
<a href="index.html">Accueil</a>
<a href="commande.html">Commander</a>
</nav>

</header>

<section class="commande">

<div class="commande-container">

<div class="form-left">

<h2>Configurer ta pièce</h2>

<label>Nom</label>
<input type="text">

<label>Email</label>
<input type="email">

<label>Moteur</label>
<select>
<option>AM6</option>
<option>Derbi</option>
</select>

<label>Type de pièce</label>
<select>
<option>Cache allumage</option>
<option>Cache obturateur</option>
<option>Récupérateur de fluide</option>
</select>

<label>Texte</label>
<input type="text">

<label>Logo</label>
<input type="file">

<label>Détails</label>
<textarea></textarea>

<button onclick="exportImage()" class="cta">
Exporter image
</button>

</div>

<div class="form-right">

<h3>Choisir la zone</h3>

<label>
<input type="radio" name="zone" value="corps" checked>
Corps
</label>

<label>
<input type="radio" name="zone" value="logo">
Logo
</label>

<h3>Couleurs</h3>

<div class="color-picker">

<div class="color" data-color="#ff0000" style="background:#ff0000"></div>
<div class="color" data-color="#0000ff" style="background:#0000ff"></div>
<div class="color" data-color="#00aa00" style="background:#00aa00"></div>
<div class="color" data-color="#7a00ff" style="background:#7a00ff"></div>
<div class="color" data-color="#ff4df2" style="background:#ff4df2"></div>
<div class="color" data-color="#000000" style="background:#000000"></div>
<div class="color" data-color="#ffffff" style="background:#ffffff"></div>

</div>

<h3>Aperçu 3D</h3>

<div id="viewer"></div>

</div>

</div>

</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/STLLoader.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script src="script.js"></script>

</body>
</html>
